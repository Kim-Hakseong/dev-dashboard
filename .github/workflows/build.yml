name: Build Dashboard Data & Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [project-updated]   # 프로젝트 repo 푸쉬 시 자동 트리거
  schedule:
    - cron: '*/15 * * * *'     # 디스패치 누락 대비 15분 백업
  workflow_dispatch:           # 수동 실행 버튼

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pyyaml

      - name: Build data.json
        env:
          GH_PAT: ${{ secrets.GH_PAT }}   # 프로젝트 repo contents read 권한
        run: python build_data.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
